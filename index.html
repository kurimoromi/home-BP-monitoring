
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BP Monitor Phase 1</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;margin:0;color:#222}
header{background:#fff;padding:18px;border-bottom:1px solid #ddd;position:sticky;top:0}
.container{max-width:1100px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label{display:block;margin:10px 0 5px}
input,select,textarea,button{
width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font:inherit;box-sizing:border-box}
textarea{min-height:60px}
button{background:#2563eb;color:#fff;border:none;font-weight:600}
.danger{background:#dc2626}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:.92rem}
.tablewrap{overflow:auto;max-height:500px}
small{color:#666}
.notice{background:#eef4ff;padding:10px;border-radius:10px;font-size:.9rem}
</style>
</head>
<body>
<header>
<b>BP Monitor – Phase 1</b><br>
<small>Monitoring Foundation</small>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Add Reading</h3>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

<div class="notice">
ก่อนวัดให้นั่งนิ่ง 3–5 นาที • ถ้าวัดหลายครั้งให้บันทึกแยกแต่ละค่า
</div>

<label>Round</label>
<select id="round">
<option>ครั้งที่ 1</option>
<option>ครั้งที่ 2</option>
<option>ครั้งที่ 3</option>
<option>เพิ่มเติม</option>
</select>

<label>SYS (เลขบน)</label>
<input type="number" inputmode="numeric" id="sys">

<label>DIA (เลขล่าง)</label>
<input type="number" inputmode="numeric" id="dia">

<label>PULSE (ชีพจร)</label>
<input type="number" inputmode="numeric" id="pulse">

<label>Location</label>
<select id="location">
<option>Home</option>
<option>Clinic</option>
<option>Hospital</option>
</select>

<label>พักก่อนวัด</label>
<select id="rest">
<option>พัก 5 นาทีขึ้นไป</option>
<option>พักไม่ถึง 5 นาที</option>
<option>ไม่ได้พักก่อนวัด</option>
</select>

<label>ท่าทาง</label>
<select id="posture">
<option>นั่ง</option>
<option>ยืน</option>
<option>นอน</option>
<option>อื่น ๆ</option>
</select>

<label>บริบท</label>
<select id="context">
<option>ปกติ</option>
<option>เดิน / รีบ</option>
<option>หลังอาหาร</option>
<option>ดื่มชา / กาแฟ</option>
<option>เครียด / กังวล</option>
<option>อื่น ๆ</option>
</select>

<label>Note</label>
<textarea id="note"></textarea>

<button onclick="saveReading()">Save Reading</button>

</div>

<div class="card">
<h3>Monitoring Notes</h3>
<div id="monitorInfo">
ยังไม่มีข้อมูล
</div>

<button class="danger" style="margin-top:12px" onclick="resetAll()">Reset All</button>
</div>

</div>

<div class="card">
<h3>Evidence Table</h3>
<div class="tablewrap">
<table>
<thead>
<tr>
<th>ID</th>
<th>Date/Time</th>
<th>BP</th>
<th>Flag</th>
<th>Context</th>
<th>Note</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script>
const tbody=document.getElementById('tbody');
const monitorInfo=document.getElementById('monitorInfo');
let undoCache=null;

function gid(id){
 return document.getElementById(id);
}

function createID(){
 return 'BP-'+Date.now();
}

function numericFlag(sys,dia){
 if(sys<100 || dia<60){
   return {label:'Low-range reading',color:'#dbeafe'};
 }
 if(sys>=140 || dia>=90){
   return {label:'Hypertension-range reading',color:'#fed7aa'};
 }
 if(sys>=120 || dia>=80){
   return {label:'Elevated-range reading',color:'#fef3c7'};
 }
 return {label:'Normal-range',color:'#dcfce7'};
}

function contextFlags(r){
 let f=[];
 if(r.rest==='พักไม่ถึง 5 นาที') f.push('Rest <5 min');
 if(r.rest==='ไม่ได้พักก่อนวัด') f.push('No pre-rest');
 if(r.location!=='Home') f.push(r.location);
 if(r.context!=='ปกติ') f.push(r.context);
 return f;
}

function saveReading(){
 let data=JSON.parse(localStorage.getItem('bpData')||'[]');

 let r={
  id:createID(),
  date:gid('date').value,
  time:gid('time').value,
  round:gid('round').value,
  sys:+gid('sys').value,
  dia:+gid('dia').value,
  pulse:gid('pulse').value,
  location:gid('location').value,
  rest:gid('rest').value,
  posture:gid('posture').value,
  context:gid('context').value,
  note:gid('note').value
 };

 if(!r.date||!r.sys||!r.dia){
   alert('กรอก Date / SYS / DIA');
   return;
 }

 data.unshift(r);
 localStorage.setItem('bpData',JSON.stringify(data));
 render();
}

function deleteRow(id){
 let data=JSON.parse(localStorage.getItem('bpData')||'[]');
 let deleted=data.find(x=>x.id===id);
 if(confirm('ลบรายการนี้หรือไม่?')){
   undoCache=deleted;
   data=data.filter(x=>x.id!==id);
   localStorage.setItem('bpData',JSON.stringify(data));
   render();
   showUndo();
 }
}

function showUndo(){
 monitorInfo.innerHTML += `
 <div style="margin-top:12px">
 <button onclick="undoDelete()">Undo Delete</button>
 </div>`;
}

function undoDelete(){
 if(!undoCache) return;
 let data=JSON.parse(localStorage.getItem('bpData')||'[]');
 data.unshift(undoCache);
 localStorage.setItem('bpData',JSON.stringify(data));
 undoCache=null;
 render();
}

function render(){
 let data=JSON.parse(localStorage.getItem('bpData')||'[]');
 tbody.innerHTML='';

 data.forEach(r=>{
   let nf=numericFlag(r.sys,r.dia);
   let cf=contextFlags(r).join(' • ');

   let prev=data.find(x=>x.date===r.date && x.time<r.time);
   let auto='';
   if(prev){
      let t1=new Date('1970-01-01T'+prev.time);
      let t2=new Date('1970-01-01T'+r.time);
      let diff=(t2-t1)/60000;
      auto=`Prev interval ${Math.round(diff)} min`;
   }

   tbody.innerHTML += `
   <tr style="background:${nf.color}">
   <td>${r.id}</td>
   <td>${r.date}<br>${r.time||''}</td>
   <td>${r.sys}/${r.dia}<br><small>${r.pulse||''}</small></td>
   <td>${nf.label}<br><small>${cf}</small></td>
   <td>${r.location}<br><small>${r.rest}</small></td>
   <td>${r.note||'-'}<br><small>${auto}</small></td>
   <td><button class="danger" onclick="deleteRow('${r.id}')">ลบ</button></td>
   </tr>`;
 });

 if(data.length){
   monitorInfo.innerHTML=`
   <b>Total readings:</b> ${data.length}<br>
   <b>Latest:</b> ${data[0].sys}/${data[0].dia}<br>
   <small>Phase 1 = monitoring foundation</small>`;
 }else{
   monitorInfo.innerHTML='ยังไม่มีข้อมูล';
 }
}

function resetAll(){
 if(confirm('ลบข้อมูลทั้งหมดหรือไม่?')){
   localStorage.removeItem('bpData');
   render();
 }
}

gid('date').valueAsDate=new Date();
render();
</script>
</body>
</html>
