<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BP Monitor Phase 2</title>
<style>
/* --------------------------------------
   1. โครงสร้างหลัก (Clean & Reset)
----------------------------------------- */
* { box-sizing: border-box; }
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;margin:0;color:#222}

/* บังคับ Header ให้แผ่กว้าง 100% ของขอบจอเสมอ */
header{background:#fff;padding:18px;border-bottom:1px solid #ddd;position:sticky;top:0;width:100%;z-index:100}

/* ตัวครอบหลักขยายเต็มพื้นที่กว้างสุด 100% ไม่มีกั๊กขอบเทา */
.container{width:100%;max-width:100%;margin:0;padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:16px}

/* จัด Layout หน้าจอใหญ่: แบ่ง 2 คอลัมน์ ซ้าย-ขวา เท่ากันแบบพอดี */
.grid{display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:stretch}
.sub-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start}

label{display:block;margin:10px 0 5px}
input,select,textarea,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font:inherit;box-sizing:border-box}
textarea{min-height:60px}
button{background:#2563eb;color:#fff;border:none;font-weight:600;cursor:pointer}
.tablewrap{overflow:visible;max-height:none;}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:.9rem}
.session{border-left:4px solid #2563eb;padding-left:10px;margin-bottom:12px}
.icon-delete{background:transparent!important;color:#666!important;border:none!important;padding:0!important;width:auto!important;cursor:pointer;font-size:16px}

.roundBtn{
 padding:10px 18px;
 border:none;
 border-radius:10px;
 background:#e5e7eb;
 color:#222;
 font-weight:600;
 min-width:52px;
 cursor:pointer;
}
.roundBtn.activeRound{
 background:#2563eb !important;
 color:#fff !important;
 box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* --------------------------------------
   2. ระบบ Responsive สำหรับมือถือ/แท็บเล็ตแนวตั้ง
   (จัดเรียงเป็นแนวตั้ง 100% ถมพื้นที่ว่างสีเทาด้านขวา)
----------------------------------------- */
@media (max-width: 991px) {
    .grid, .sub-grid {
        grid-template-columns: 1fr !important; /* ยุบเหลือ 1 คอลัมน์เรียงต่อกันลงมา */
        gap: 16px !important;
    }
    header {
        padding: 14px 16px !important;
    }
    .container {
        padding: 12px !important;
    }
    th, td { padding: 8px 4px !important; font-size: 0.8rem !important; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
</head>
<body>

<header>
<b>BP Monitor – Phase 2</b><br>
<small>Monitoring Workspace</small>
<div style="float:right;font-size:.85rem;display:flex;gap:8px;align-items:center">
<span id="familyBadge">Family: Not Connected</span>
<button id="copyFamilyBtn" style="width:auto;padding:6px 10px">📋</button>
</div>
</header>

<div id="familySetup" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999">
<div style="background:#fff;padding:20px;border-radius:16px;width:min(90vw,420px)">
<h3>Family Code</h3>
<p>กรอกรหัสครอบครัว เช่น RABB-559</p>
<input id="familyCodeInput" placeholder="RABB-559">
<button id="familyContinueBtn" style="margin-top:12px">Continue</button>
</div>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Add Reading</h3>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time" onchange="autoSession()">
<div style="display:flex;gap:8px;margin-top:6px">
<button type="button" id="minus5Btn" style="width:auto;padding:6px 12px">−5m</button>
<button type="button" id="plus5Btn" style="width:auto;padding:6px 12px">+5m</button>
</div>

<label>Session</label>
<select id="session">
<option>เช้า</option>
<option>กลางคืน</option>
<option>อื่น ๆ</option>
</select>

<label>Round</label>
<div id="roundButtons" style="display:flex;gap:8px;margin-top:6px">
<button type="button" class="roundBtn activeRound" data-round="1">1</button>
<button type="button" class="roundBtn" data-round="2">2</button>
<button type="button" class="roundBtn" data-round="3">3</button>
<input type="hidden" id="round" value="1">
</div>

<label>SYS (เลขบน)</label>
<input type="number" id="sys" inputmode="numeric" pattern="[0-9]*">

<label>DIA (เลขล่าง)</label>
<input type="number" id="dia" inputmode="numeric" pattern="[0-9]*">

<label>PULSE (ชีพจร)</label>
<input type="number" id="pulse" inputmode="numeric" pattern="[0-9]*">

<label>Location</label>
<select id="location">
<option>Home</option>
<option>อื่น ๆ</option>
<option>Hospital</option>
</select>

<label>Medication</label>
<select id="medication">
<option>ทานยา</option>
<option>ไม่ทานยา</option>
<option>ไม่แน่ใจ</option>
</select>

<label>Rest</label>
<select id="rest">
<option>พัก 5 นาทีขึ้นไป</option>
<option>พักไม่ถึง 5 นาที</option>
<option>ไม่ได้พักก่อนวัด</option>
</select>

<label>Context</label>
<select id="context">
<option>ปกติ</option>
<option>เดิน / รีบ</option>
<option>หลังอาหาร</option>
<option>ดื่มชา / กาแฟ</option>
<option>เครียด / กังวล</option>
<option>อื่น ๆ</option>
</select>

<label>Note</label>
<textarea id="note"></textarea>

<button onclick="saveReading()">Save Reading</button>
</div>

<div class="card" style="display:flex; flex-direction:column; justify-content:space-between;">
<div>
<h3>Monitoring Dashboard</h3>

<label>Source Filter</label>
<select id="filter" onchange="renderAll()">
<option value="Home" selected>Home only</option>
<option value="Clinic">Clinic only</option>
<option value="Hospital">Hospital only</option>
<option value="all">All sources</option>
</select>

<div id="dashboard"></div>
</div>

<div class="chart-wrapper" style="position:relative; width:100%; height:340px; margin-top:15px;">
 <canvas id="chart"></canvas>
</div>

<div>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
<button onclick="saveReportImage()">Save Report Image</button>
<button onclick="saveGraphImage()">Save Graph</button>
</div>
<div id="chartStatus" style="margin-top:8px;font-size:.85rem;color:#666"></div>
</div>

</div>
</div>

<div class="sub-grid">
<div class="card">
<h3>Evidence Table</h3>
<div class="tablewrap">
<table id="evidenceTable">
<thead>
<tr>
<th>Date/Time</th><th>Session</th><th>BP</th><th>Pulse</th><th>Location</th><th>Medication</th><th>Note</th><th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div class="card">
<h3>Session Timeline</h3>
<div id="timeline"></div>
</div>
</div>

</div>
