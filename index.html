
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BP Monitor Phase 3</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;margin:0;color:#222}
header{background:#fff;padding:18px;border-bottom:1px solid #ddd;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:16px}
.controls{display:flex;gap:10px;flex-wrap:wrap}
input,select,button{
padding:12px;border-radius:10px;border:1px solid #ccc;font:inherit}
button{background:#2563eb;color:#fff;border:none;font-weight:600}
.secondary{background:#64748b}
.tablewrap{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:#fff}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:.9rem}
#reportView{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px}
</style>
</head>
<body>

<header>
<b>BP Monitor – Phase 3</b><br>
<small>Physician Communication Layer</small>
</header>

<div class="container">

<div class="card">
<div class="controls">
<select id="sourceFilter">
<option value="Home">Home only</option>
<option value="Clinic">Clinic only</option>
<option value="Hospital">Hospital only</option>
<option value="all">All sources</option>
</select>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="renderReport()">Generate Report</button>
<button onclick="saveReportImage()">Save Report Image</button>
<button class="secondary" onclick="saveGraphImage()">Save Graph</button>
</div>
</div>

<div id="reportView">

<div class="card">
<h3>Monitoring Dashboard</h3>
<div id="dashboard"></div>
</div>

<div class="card">
<h3>Blood Pressure Trend</h3>
<canvas id="chart" height="220"></canvas>
</div>

<div class="card">
<h3>Evidence Table</h3>

<input type="text" id="searchBox" placeholder="Search..." oninput="renderReport()">

<div class="tablewrap">
<table>
<thead>
<tr>
<th>ID</th>
<th>Date</th>
<th>Time</th>
<th>BP</th>
<th>Flag</th>
<th>Location</th>
<th>Session</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
function gid(x){return document.getElementById(x)}
let chartObj=null;

function numericFlag(sys,dia){
 if(sys<100||dia<60) return {label:'Low',color:'#dbeafe'};
 if(sys>=140||dia>=90) return {label:'Hypertension',color:'#fed7aa'};
 if(sys>=120||dia>=80) return {label:'Elevated',color:'#fef3c7'};
 return {label:'Normal',color:'#dcfce7'};
}

function filteredData(){
 let data=JSON.parse(localStorage.getItem('bpData')||'[]');

 let source=gid('sourceFilter').value;
 if(source!=='all'){
   data=data.filter(x=>x.location===source);
 }

 let from=gid('fromDate').value;
 let to=gid('toDate').value;

 if(from){
   data=data.filter(x=>x.date>=from);
 }
 if(to){
   data=data.filter(x=>x.date<=to);
 }

 let q=gid('searchBox') ? gid('searchBox').value.toLowerCase() : '';
 if(q){
  data=data.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
 }

 return data;
}

function renderReport(){
 let data=filteredData();

 renderDashboard(data);
 renderTable(data);
 renderChart(data);
}

function renderDashboard(data){
 if(!data.length){
   gid('dashboard').innerHTML='ยังไม่มีข้อมูล';
   return;
 }

 let latest=data[0];

 gid('dashboard').innerHTML=`
 <b>Monitoring Period</b><br>
 ${data[data.length-1].date} → ${latest.date}<br><br>

 <b>Total readings</b><br>
 ${data.length}<br><br>

 <b>Latest</b><br>
 ${latest.sys}/${latest.dia}<br>
 ${latest.location}<br>
 ${latest.time}
 `;
}

function renderTable(data){
 let tbody=gid('tbody');
 tbody.innerHTML='';

 data.forEach(r=>{
  let nf=numericFlag(r.sys,r.dia);

  tbody.innerHTML+=`
  <tr style="background:${nf.color}">
  <td>${r.id}</td>
  <td>${r.date}</td>
  <td>${r.time}</td>
  <td>${r.sys}/${r.dia}</td>
  <td>${nf.label}</td>
  <td>${r.location}</td>
  <td>${r.session||'-'}</td>
  </tr>`;
 });
}

function renderChart(data){
 let ctx=gid('chart');
 if(chartObj) chartObj.destroy();

 chartObj=new Chart(ctx,{
 type:'line',
 data:{
  labels:data.map(x=>x.date+' '+x.time).reverse(),
  datasets:[
   {label:'SYS',data:data.map(x=>x.sys).reverse()},
   {label:'DIA',data:data.map(x=>x.dia).reverse()}
  ]
 }
 });
}

function saveReportImage(){
 html2canvas(gid('reportView')).then(canvas=>{
   let a=document.createElement('a');
   a.download='BP_Report.png';
   a.href=canvas.toDataURL();
   a.click();
 });
}

function saveGraphImage(){
 let a=document.createElement('a');
 a.download='BP_Graph.png';
 a.href=gid('chart').toDataURL();
 a.click();
}

renderReport();
</script>

</body>
</html>
