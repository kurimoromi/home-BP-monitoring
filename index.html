
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BP Monitor Phase 2</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;margin:0;color:#222}
header{background:#fff;padding:18px;border-bottom:1px solid #ddd;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label{display:block;margin:10px 0 5px}
input,select,textarea,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font:inherit;box-sizing:border-box}
textarea{min-height:60px}
button{background:#2563eb;color:#fff;border:none;font-weight:600}
.tablewrap{overflow:auto;max-height:520px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:.9rem}
.session{border-left:4px solid #2563eb;padding-left:10px;margin-bottom:12px}.icon-delete{background:transparent!important;color:#666!important;border:none!important;padding:0!important;width:auto!important;cursor:pointer;font-size:16px}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script></head>
<body>
<header>
<b>BP Monitor – Phase 2</b><br>
<small>Monitoring Workspace</small>
<div style="float:right;font-size:.85rem;display:flex;gap:8px;align-items:center">
<span id="familyBadge">Family: Not Connected</span>
<button id="copyFamilyBtn" style="width:auto;padding:6px 10px">📋</button>
</div>
</header>


<div id="familySetup" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999">
<div style="background:#fff;padding:20px;border-radius:16px;width:min(90vw,420px)">
<h3>Family Code</h3>
<p>กรอกรหัสครอบครัว เช่น RABB-559</p>
<input id="familyCodeInput" placeholder="RABB-559">
<button id="familyContinueBtn" style="margin-top:12px">Continue</button>
</div>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Add Reading</h3>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time" onchange="autoSession()">

<label>Session</label>
<select id="session">
<option>เช้า</option>

<option>กลางคืน</option>
<option>อื่น ๆ</option>
</select>

<label>Round</label>
<select id="round">
<option>1</option>
<option>2</option>
<option>3</option>
<option>More</option>
</select>

<label>SYS (เลขบน)</label>
<input type="number" id="sys" inputmode="numeric" pattern="[0-9]*">

<label>DIA (เลขล่าง)</label>
<input type="number" id="dia" inputmode="numeric" pattern="[0-9]*">

<label>PULSE (ชีพจร)</label>
<input type="number" id="pulse" inputmode="numeric" pattern="[0-9]*">

<label>Location</label>
<select id="location">
<option>Home</option>
<option>อื่น ๆ</option>
<option>Hospital</option>
</select>

<label>Medication</label>
<select id="medication">
<option>ทานยา</option>
<option>ไม่ทานยา</option>
<option>ไม่แน่ใจ</option>
</select>

<label>Rest</label>
<select id="rest">
<option>พัก 5 นาทีขึ้นไป</option>
<option>พักไม่ถึง 5 นาที</option>
<option>ไม่ได้พักก่อนวัด</option>
</select>

<label>Context</label>
<select id="context">
<option>ปกติ</option>
<option>เดิน / รีบ</option>
<option>หลังอาหาร</option>
<option>ดื่มชา / กาแฟ</option>
<option>เครียด / กังวล</option>
<option>อื่น ๆ</option>
</select>

<label>Note</label>
<textarea id="note"></textarea>

<button onclick="saveReading()">Save Reading</button>
</div>

<div class="card">
<h3>Monitoring Dashboard</h3>

<label>Source Filter</label>
<select id="filter" onchange="renderAll()">
<option value="Home" selected>Home only</option>
<option value="Clinic">Clinic only</option>
<option value="Hospital">Hospital only</option>
<option value="all">All sources</option>
</select>

<div id="dashboard"></div>
<canvas id="chart" height="220"></canvas>



<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
<button onclick="saveReportImage()">Save Report Image</button>
<button onclick="saveGraphImage()">Save Graph</button>
</div><div id="chartStatus" style="margin-top:8px;font-size:.85rem;color:#666"></div>

</div>
</div>

<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px"><div class="card">
<h3>Evidence Table</h3>
<div class="tablewrap">
<table>
<thead>
<tr>
<th>Date/Time</th><th>Session</th><th>BP</th><th>Pulse</th><th>Location</th><th>Medication</th><th>Note</th><th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div></div>

<div class="card">
<h3>Session Timeline</h3>
<div id="timeline"></div>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script>
function gid(x){return document.getElementById(x)}

function createID(){ return 'BP-'+Date.now(); }

function numericFlag(sys,dia){
 if(sys<100 || dia<60) return {label:'Low',color:'#dbeafe'};
 if(sys>=140 || dia>=90) return {label:'Hypertension-range',color:'#fed7aa'};
 if(sys>=120 || dia>=80) return {label:'Elevated',color:'#fef3c7'};
 return {label:'Normal',color:'#dcfce7'};
}


function autoSession(){
 let t=gid('time').value;
 if(!t) return;
 let h=parseInt(t.split(':')[0]);
 if(h<12){gid('session').value='เช้า';}
 else{gid('session').value='กลางคืน';}
}

function saveReading(){
 let data=window.bpDataCache||[];

 autoSession();

 let r={
  id:createID(),
  date:gid('date').value,
  time:gid('time').value,
  session:gid('session').value,
  round:gid('round').value,
  sys:+gid('sys').value,
  dia:+gid('dia').value,
  pulse:gid('pulse').value,
  location:gid('location').value,
  medication:gid('medication').value,
  rest:gid('rest').value,
  context:gid('context').value,
  note:gid('note').value
 };

 if(!r.date||!r.sys||!r.dia){
  alert('กรอก Date/SYS/DIA');
  return;
 }

 data.unshift(r);
 // cloud managed

 gid('sys').value='';
 gid('dia').value='';
 gid('pulse').value='';
 gid('note').value='';
 gid('context').selectedIndex=0;
 gid('rest').selectedIndex=0;

 renderAll();
}

function filteredData(){
 let data=window.bpDataCache||[];
 let f=gid('filter').value;
 if(f!=='all') data=data.filter(x=>x.location===f);
 return data;
}

let chartObj=null;

function renderAll(){
 let data=filteredData();

 renderDashboard(data);
 renderTimeline(data);
 renderTable(data);
 renderChart(data);
}

function renderDashboard(data){
 if(!data.length){
  gid('dashboard').innerHTML='ยังไม่มีข้อมูล';
  return;
 }

 let latest=data[0];
 gid('dashboard').innerHTML=`
 <div class="session">
 <b>Monitoring Period</b><br>
 ${data[data.length-1].date} → ${latest.date}<br><br>

 <b>Latest Reading</b><br>
 ${latest.sys}/${latest.dia}<br>
 ${latest.time}<br>
 ${latest.location}<br>
 ${latest.rest}
 </div>`;
}

function renderTimeline(data){
 let groups={};

 data.forEach(r=>{
  let key=r.date+'-'+r.session;
  if(!groups[key]) groups[key]=[];
  groups[key].push(r);
 });

 let html='';

 Object.keys(groups).forEach(k=>{
  let arr=groups[k];
  html+=`<div class="session">
  <b>${k}</b><br>`;

  if(arr.length>=2){
    let sorted=arr.slice().sort((a,b)=>a.time.localeCompare(b.time));
    let closeFound=false;
    for(let i=0;i<sorted.length-1;i++){
      let a=sorted[i], b=sorted[i+1];
      let close=Math.abs(a.sys-b.sys)<=5 && Math.abs(a.dia-b.dia)<=5;
      if(close){
        closeFound=true;
        html+=`✓ 2 readings close together (${a.round} ↔ ${b.round})<br>`;
        break;
      }
    }
    if(!closeFound){
      html+=`No close pair yet<br>`;
    }
  }

  arr.forEach(r=>{
    html+=`${r.time} • ${r.sys}/${r.dia}<br>`;
  });

  html+='</div>';
 });

 gid('timeline').innerHTML=html || 'ยังไม่มี session';
}

function renderTable(data){
 let tbody=gid('tbody');
 tbody.innerHTML='';

 data.forEach(r=>{
  tbody.innerHTML+=`
  <tr>
  <td>${r.date}<br>${r.time}</td>
  <td>${(r.session||'-')} #${(r.round||'-')}</td>
  <td>${r.sys}/${r.dia}</td>
  <td>${r.pulse||'-'}</td>
  <td>${r.location||'-'}</td>
  <td>${r.medication||'-'}</td>
  <td>${r.note||'-'}</td>
  <td><button class="icon-delete" onclick="deleteReading('${r.id}')">🗑️</button></td>
  </tr>`;
 });
}

function renderChart(data){
 let ctx=gid('chart');

 if(chartObj) chartObj.destroy();

 chartObj=new Chart(ctx,{
  plugins:[ChartDataLabels],
  type:'line',
  options:{
   plugins:{
    datalabels:{
      anchor:'end',
      align:'top',
      formatter:(v)=>v,
      font:{size:10}
    }
   },
   scales:{
    y:{min:40,max:200}
   }
  },
  data:{
   labels:data.map(x=>x.date+' '+x.time).reverse(),
   datasets:[
    {label:'SYS',data:data.map(x=>x.sys).reverse()},
    {label:'DIA',data:data.map(x=>x.dia).reverse()}
   ]
  }
 });
}

function saveReportImage(){
 const table=document.querySelector('.tablewrap');
 const dels=document.querySelectorAll('.icon-delete, th:last-child, td:last-child');
 dels.forEach(el=>el.style.display='none');
 html2canvas(table,{backgroundColor:'#ffffff'}).then(canvas=>{
  let a=document.createElement('a');
  a.download='BP_Evidence_Table.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
  dels.forEach(el=>el.style.display='');
 });
}

function saveGraphImage(){
 let c=document.getElementById('chart');
 let bg=document.createElement('canvas');
 bg.width=c.width;
 bg.height=c.height;
 let ctx=bg.getContext('2d');
 ctx.fillStyle='#ffffff';
 ctx.fillRect(0,0,bg.width,bg.height);
 ctx.drawImage(c,0,0);
 let a=document.createElement('a');
 a.download='BP_Graph.png';
 a.href=bg.toDataURL('image/png');
 a.click();
}


function deleteReading(id){
 if(!confirm('ลบรายการนี้?')) return;
 let data=window.bpDataCache||[];
 data=data.filter(x=>x.id!==id);
 // cloud managed
 renderAll();
}


(function migrateLegacyRecords(){
 let data=window.bpDataCache||[];
 let changed=false;
 data.forEach((r,i)=>{
   if(!r.id){
     r.id='LEGACY-'+i+'-'+Date.now();
     changed=true;
   }
 });
 if(changed){
   // cloud managed
 }
})();

gid('date').valueAsDate=new Date();
renderAll();
</script>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbA_HXqmOIKJrJ8D12tlk7d_vUXaVsi0E",
  authDomain: "bp-monitor-family.firebaseapp.com",
  projectId: "bp-monitor-family",
  storageBucket: "bp-monitor-family.firebasestorage.app",
  messagingSenderId: "456193142332",
  appId: "1:456193142332:web:162bd74937e14a0fd39d39"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
window.bpDataCache=[];

async function startSync(){
 await signInAnonymously(auth);

 let code=localStorage.getItem('familyCode');
 const modal=document.getElementById('familySetup');

 function updateBadge(){
   document.getElementById('familyBadge').textContent='Family: '+code;
 }

 if(!code){
   modal.style.display='flex';
 } else {
   updateBadge();
   connect(code);
 }

 document.getElementById('familyContinueBtn')?.addEventListener('click',()=>{
   code=document.getElementById('familyCodeInput').value.trim();
   if(!code) return alert('กรุณากรอก Family Code');
   localStorage.setItem('familyCode',code);
   updateBadge();
   modal.style.display='none';
   connect(code);
 });

 document.getElementById('copyFamilyBtn')?.addEventListener('click',()=>{
   navigator.clipboard.writeText(code||'');
   alert('คัดลอก Family Code แล้ว');
 });

 function connect(familyCode){
   const q=query(collection(db,'families',familyCode,'readings'),orderBy('createdAt','desc'));
   onSnapshot(q,(snap)=>{
     window.bpDataCache=snap.docs.map(d=>({id:d.id,...d.data()}));
     renderAll();
   });
   window.saveReading=async function(){
      autoSession();
      let r={
       createdAt:Date.now(),
       date:gid('date').value,
       time:gid('time').value,
       session:gid('session').value,
       round:gid('round').value,
       sys:+gid('sys').value,
       dia:+gid('dia').value,
       pulse:gid('pulse').value,
       location:gid('location').value,
       medication:gid('medication').value,
       rest:gid('rest').value,
       context:gid('context').value,
       note:gid('note').value
      };
      if(!r.date||!r.sys||!r.dia){alert('กรอก Date/SYS/DIA');return;}
      await addDoc(collection(db,'families',familyCode,'readings'),r);
      gid('sys').value='';gid('dia').value='';gid('pulse').value='';gid('note').value='';
   }
   window.deleteReading=async function(id){
      if(!confirm('ลบรายการนี้?')) return;
      await deleteDoc(doc(db,'families',familyCode,'readings',id));
   }
 }
}

window.addEventListener('load',startSync);
</script>

</body>
</html>
